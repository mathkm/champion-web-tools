server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # トップ：CSV読み込み版 index.html
    location = / {
        try_files /index.html =404;
    }

    # realtime版 index.html
    location = /realtime/ {
        try_files /realtime/index.html =404;
    }

    # データ配信：ディレクトリ一覧を JSON で返す + キャッシュ無効 + Range 対応
    location /data/ {
        autoindex on;
        autoindex_format json;          # /data/ を fetch すると [{name,type,mtime,size}, ...] が返る
        add_header Cache-Control "no-cache";
        expires -1;
        # Range(Accept-Ranges: bytes) は nginx の静的配信で既定有効
    }
}
